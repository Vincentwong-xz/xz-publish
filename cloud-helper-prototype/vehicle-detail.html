<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Cloud Helper · 车辆详情</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="vd">
  <div class="vd-header">
    <span class="signal-pill" id="sig">999ms</span>
    <span class="title" id="vid">GZU_YKN_24088</span>
    <span class="dest">（生物岛-测试）　前往：【测】小广场加贴边</span>
    <div class="right">
      <button onclick="location.href='index.html'">切换车辆</button>
      <button onclick="location.href='index.html'">退出</button>
    </div>
  </div>

  <div class="vd-left">
    <div class="item"><div class="label">水量</div><div class="val">0%</div></div>
    <div class="item"><div class="label">电量</div><div class="val">95.2%</div></div>
    <div class="item"><div class="label">集尘</div><div class="val">未满</div></div>
  </div>

  <div class="vd-main">
    <div class="toolbar">
      <button class="active">广角</button>
      <button>鱼眼</button>
    </div>
    <div class="hud">
      <div class="grp"><div class="l">限速</div><div class="speed-limit">5</div></div>
      <div class="grp"><div class="l">行驶速度</div><div style="font-size:18px;font-weight:700">3.8<span style="font-size:11px;color:var(--text-dim)">km/h</span></div></div>
      <div class="grp"><div class="l">档位</div><div class="gear">D</div></div>
      <div class="grp"><div class="l">模式</div><div style="color:var(--green);font-weight:600"><span class="mode-dot"></span>自动</div></div>
    </div>
    <div class="feed"></div>
  </div>

  <div class="vd-side-cams">
    <div class="vd-cam"><div class="tag">前视图</div><div class="feed"></div></div>
    <div class="vd-cam"><div class="tag">后视图</div><div class="feed" style="background:linear-gradient(135deg,#3a4a5a,#5a7080)"></div></div>
    <div class="topdown">
      <div class="tag" style="position:absolute;top:6px;left:8px;background:rgba(0,0,0,.6);padding:2px 6px;border-radius:3px;font-size:11px;z-index:2">模拟俯视图</div>
      <svg viewBox="0 0 300 280" preserveAspectRatio="xMidYMid meet">
        <!-- Curb / 路沿（路基）-->
        <defs>
          <pattern id="curbHatch" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
            <line x1="0" y1="0" x2="0" y2="6" stroke="#a06832" stroke-width="2"/>
          </pattern>
        </defs>
        <!-- Drivable area background -->
        <rect x="0" y="0" width="300" height="280" fill="#0a1a18"/>
        <!-- Road surface -->
        <path d="M40,0 L40,280 L260,280 L260,0 Z" fill="#16332e"/>
        <!-- Lane markings -->
        <line x1="150" y1="0" x2="150" y2="280" stroke="#2ec4b6" stroke-width="1" stroke-dasharray="8 8" opacity="0.6"/>
        <!-- Curb left (路沿) -->
        <rect x="30" y="0" width="10" height="280" fill="url(#curbHatch)" stroke="#a06832" stroke-width="1.5"/>
        <text x="6" y="140" fill="#a06832" font-size="9" transform="rotate(-90 12 140)">路沿</text>
        <!-- Curb right -->
        <rect x="260" y="0" width="10" height="280" fill="url(#curbHatch)" stroke="#a06832" stroke-width="1.5"/>
        <text x="278" y="140" fill="#a06832" font-size="9" transform="rotate(-90 278 140)">路基</text>
        <!-- Road obstacles / cones -->
        <circle cx="110" cy="80" r="3" fill="#f39c12"/>
        <circle cx="110" cy="100" r="3" fill="#f39c12"/>
        <rect x="180" y="60" width="14" height="6" fill="#2ec4b6" opacity="0.7"/>
        <rect x="190" y="40" width="10" height="5" fill="#2ec4b6" opacity="0.7"/>
        <!-- Vehicle (ego) -->
        <g transform="translate(150,200)">
          <rect x="-12" y="-22" width="24" height="44" rx="3" fill="#e8e8ec" stroke="#6c5ce7" stroke-width="1.5"/>
          <rect x="-9" y="-18" width="18" height="10" fill="#6c5ce7" opacity="0.6"/>
          <polygon points="0,-26 -4,-22 4,-22" fill="#6c5ce7"/>
        </g>
        <!-- Trajectory -->
        <path d="M150,200 Q145,150 148,80" stroke="#6c5ce7" stroke-width="1.5" fill="none" stroke-dasharray="4 4" opacity="0.7"/>
        <!-- Legend -->
        <g transform="translate(8,260)">
          <rect x="0" y="0" width="10" height="8" fill="url(#curbHatch)" stroke="#a06832"/>
          <text x="14" y="7" fill="#a06832" font-size="9">路沿/路基</text>
          <line x1="80" y1="4" x2="92" y2="4" stroke="#6c5ce7" stroke-width="1.5" stroke-dasharray="3 3"/>
          <text x="96" y="7" fill="#6c5ce7" font-size="9">规划路径</text>
        </g>
      </svg>
    </div>
  </div>

  <div class="vd-controls">
    <div class="panel">
      <h4>车辆操控</h4>
      <div class="btn-grid">
        <button><span class="ic">↰</span><span>左变道</span></button>
        <button><span class="ic">↑</span><span>保持</span></button>
        <button><span class="ic">↱</span><span>右变道</span></button>
        <button><span class="ic">↶</span><span>左侧绕行</span></button>
        <button></button>
        <button><span class="ic">↷</span><span>右侧绕行</span></button>
        <button class="warn"><span class="ic">⏸</span><span>缓停</span></button>
        <button></button>
        <button class="danger"><span class="ic">⛔</span><span>急停</span></button>
      </div>
      <div class="field">
        <label>R 倒车</label>
        <div class="row">
          <button>开始</button><button>暂停</button><button>结束</button>
        </div>
      </div>
      <div class="field">
        <label>车辆限速</label>
        <div style="display:flex;gap:6px">
          <input placeholder="请输入" style="flex:1"><span style="align-self:center;color:var(--text-dim)">km/h</span><button>确认</button>
        </div>
      </div>
    </div>

    <div class="panel">
      <h4>上装控制 <button style="font-size:11px">安全停车</button></h4>
      <div class="toggle-row"><span class="toggle on">开启</span><span>清扫作业</span></div>
      <div class="row"><button>暂停</button><button>恢复</button></div>

      <div class="toggle-row" style="margin-top:12px"><span class="toggle off">关闭</span><span>倾倒垃圾</span></div>
      <button style="width:100%">需安全停车</button>

      <div class="toggle-row" style="margin-top:12px"><span class="toggle off">关闭</span><span>大灯</span></div>
      <div class="row"><button>关闭</button><button>开启</button></div>

      <div class="field">
        <label>清扫宽度</label>
        <input type="range" class="slider" min="0" max="10" value="5">
        <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text-dim)"><span>窄</span><span>宽</span></div>
      </div>

      <div class="field">
        <label>手动震尘</label>
        <button style="width:100%">开始震尘</button>
      </div>
    </div>
  </div>

  <div class="vd-aux">
    <div></div>
    <div class="aux-cams">
      <div class="aux-cam"><div class="tag">左视图</div><div class="feed"></div></div>
      <div class="aux-cam"><div class="tag">前视图</div><div class="feed" style="background:linear-gradient(135deg,#5d7891,#8aa3b8)"></div></div>
      <div class="aux-cam"><div class="tag">右视图</div><div class="feed"></div></div>
    </div>
  </div>
</div>

<script>
const params = new URLSearchParams(location.search);
const id = params.get('id');
if (id) document.getElementById('vid').textContent = id;
</script>
</body>
</html>
