<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>我 - 环卫管理</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",Arial,sans-serif;background:#f2f3f5;color:#1d2129;padding-bottom:72px;}
  .phone{max-width:420px;margin:0 auto;min-height:100vh;position:relative;background:linear-gradient(180deg,#d8e8ff 0%,#eef3fb 200px,#f2f3f5 320px);}
  .status-bar{height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;font-size:14px;font-weight:600;color:#1d2129;}
  .status-bar .right{display:flex;gap:6px;align-items:center;font-size:12px;}
  .header{padding:16px 20px 20px;}
  .loc-row{display:flex;justify-content:space-between;align-items:flex-start;}
  .loc{font-size:22px;font-weight:600;display:flex;align-items:center;gap:4px;}
  .loc .caret{display:inline-flex;width:22px;height:22px;border-radius:50%;background:#fff;align-items:center;justify-content:center;font-size:10px;color:#4e5969;}
  .weather{text-align:right;font-size:14px;color:#4e5969;line-height:1.3;display:flex;align-items:flex-start;gap:6px;}
  .weather .temp{font-size:34px;font-weight:300;color:#86a8e7;line-height:1;}
  .weather .small{font-size:12px;}
  .user-card{background:#fff;border-radius:12px;margin:12px 16px 0;padding:14px 16px;box-shadow:0 2px 8px rgba(0,0,0,0.04);}
  .user-line{display:flex;align-items:baseline;gap:8px;}
  .user-name{font-size:17px;font-weight:600;}
  .user-phone{font-size:13px;color:#86909c;}
  .notice{margin-top:10px;background:#eef4ff;border-radius:8px;padding:10px 12px;display:flex;align-items:center;gap:8px;font-size:13px;color:#4e5969;}
  .notice .ic{color:#165dff;}
  .notice .text{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .notice .more{color:#165dff;font-size:13px;flex-shrink:0;cursor:pointer;}
  .card{background:#fff;border-radius:12px;margin:12px 16px 0;box-shadow:0 2px 8px rgba(0,0,0,0.04);overflow:hidden;}
  .menu-item{display:flex;align-items:center;justify-content:space-between;padding:18px 16px;font-size:16px;cursor:pointer;}
  .menu-item+.menu-item{border-top:1px solid #f2f3f5;}
  .menu-item .arrow{color:#c9cdd4;font-size:18px;}
  .menu-item .new-dot{display:inline-block;width:6px;height:6px;background:#f53f3f;border-radius:50%;margin-left:6px;vertical-align:top;}
  .logout{text-align:center;padding:18px;font-size:15px;color:#4e5969;margin-top:12px;}
  .tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:420px;background:#fff;display:flex;border-top:1px solid #e5e6eb;padding-bottom:6px;}
  .tab{flex:1;text-align:center;padding:8px 0 4px;font-size:11px;color:#86909c;cursor:pointer;}
  .tab.active{color:#165dff;}
  .tab .ic{font-size:22px;display:block;margin-bottom:2px;}
  .tab.active .ic{color:#165dff;}

  /* Export management page */
  .page{display:none;}
  .page.show{display:block;}
  .subnav{background:#fff;padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #f0f1f3;position:sticky;top:0;z-index:10;}
  .subnav .back{font-size:22px;cursor:pointer;color:#1d2129;}
  .subnav .title{font-size:17px;font-weight:600;flex:1;}
  .tip{padding:10px 16px;font-size:12px;color:#86909c;}
  .exp-list{padding:0 16px;}
  .exp-item{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,0.04);}
  .exp-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
  .exp-name{font-size:15px;font-weight:600;color:#1d2129;}
  .badge{font-size:11px;padding:2px 8px;border-radius:10px;}
  .badge.success{background:#e8f7ee;color:#00a86b;}
  .badge.pending{background:#fff7e8;color:#ff7d00;}
  .badge.failed{background:#fde8e8;color:#f53f3f;}
  .badge.expired{background:#f2f3f5;color:#86909c;}
  .exp-meta{font-size:12px;color:#86909c;line-height:1.6;}
  .exp-meta .row{display:flex;gap:8px;}
  .exp-meta .lbl{color:#86909c;}
  .exp-meta .val{color:#4e5969;}
  .exp-actions{margin-top:10px;display:flex;gap:8px;}
  .btn{flex:1;padding:8px 0;border-radius:8px;font-size:13px;text-align:center;border:none;cursor:pointer;}
  .btn-primary{background:#165dff;color:#fff;}
  .btn-ghost{background:#f2f3f5;color:#4e5969;}
  .btn-disabled{background:#f7f8fa;color:#c9cdd4;cursor:not-allowed;}
  .empty{text-align:center;padding:60px 20px;color:#86909c;font-size:13px;}
  .toast{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.8);color:#fff;padding:12px 18px;border-radius:8px;font-size:13px;z-index:200;display:none;}
</style>
</head>
<body>
<div class="phone">

  <!-- Page 1: 我 -->
  <div class="page show" id="page-me">
    <div class="status-bar">
      <span>14:27</span>
      <span class="right">106 KB/s · 5G · 🔋83</span>
    </div>

    <div class="header">
      <div class="loc-row">
        <div class="loc">生物岛 <span class="caret">▾</span></div>
        <div class="weather">
          <div>21°C/<br/>阴</div>
          <div class="temp">31<span class="small">°C</span></div>
        </div>
      </div>
    </div>

    <div class="user-card">
      <div class="user-line">
        <div class="user-name">xinzhangwang</div>
        <div class="user-phone">185****0447</div>
      </div>
      <div class="notice">
        <span class="ic">🔊</span>
        <span class="text">车辆GZU_YKU_25216的「右…</span>
        <span class="more">查看全部</span>
      </div>
    </div>

    <div class="card">
      <div class="menu-item"><span>人员管理</span><span class="arrow">›</span></div>
      <div class="menu-item"><span>车位管理</span><span class="arrow">›</span></div>
      <div class="menu-item"><span>车辆管理</span><span class="arrow">›</span></div>
      <div class="menu-item"><span>路线管理</span><span class="arrow">›</span></div>
      <div class="menu-item" onclick="showExport()"><span>导出管理<span class="new-dot"></span></span><span class="arrow">›</span></div>
    </div>

    <div class="card">
      <div class="menu-item"><span>账号与安全</span><span class="arrow">›</span></div>
      <div class="menu-item"><span>版本信息 V1.3.5</span><span class="arrow">›</span></div>
    </div>

    <div class="card">
      <div class="menu-item"><span>法律条款及平台规则</span><span class="arrow">›</span></div>
    </div>

    <div class="logout">退出登录</div>
  </div>

  <!-- Page 2: 导出管理 -->
  <div class="page" id="page-export">
    <div class="subnav">
      <span class="back" onclick="showMe()">‹</span>
      <span class="title">导出管理</span>
    </div>
    <div class="tip">仅展示近 7 天导出记录，文件在生成后保留 7 天</div>
    <div class="exp-list" id="expList"></div>
  </div>

  <div class="tabbar">
    <div class="tab"><span class="ic">💗</span>服务</div>
    <div class="tab"><span class="ic">📋</span>任务</div>
    <div class="tab"><span class="ic">🚗</span>设备</div>
    <div class="tab"><span class="ic">📊</span>统计</div>
    <div class="tab active"><span class="ic">😊</span>我</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const today=new Date();
function fmt(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function daysAgo(n,h=10,m=0){const d=new Date(today);d.setDate(d.getDate()-n);d.setHours(h,m,0,0);return d;}

const records=[
  {name:'全部车辆统计_近7天.xlsx',status:'success',createTime:daysAgo(0,14,12),range:'2026-04-16 至 2026-04-22',vehicles:'全部车辆',items:'任务/里程/用水/充电',size:'286 KB',expireIn:7},
  {name:'S5-001~003统计_自定义.csv',status:'pending',createTime:daysAgo(0,14,5),progress:62,range:'2026-04-01 至 2026-04-22',vehicles:'S5-001, S5-002, S5-003',items:'任务/里程/用水/充电/取消原因',size:'--',expireIn:7},
  {name:'R2车队月度.xlsx',status:'success',createTime:daysAgo(1,9,30),range:'2026-03-22 至 2026-04-21',vehicles:'R2-201, R2-202',items:'任务/里程/充电',size:'1.2 MB',expireIn:6},
  {name:'全部车辆统计_4月14日.xlsx',status:'failed',createTime:daysAgo(3,11,45),errMsg:'数据源超时，请稍后重试',range:'2026-04-14',vehicles:'全部车辆',items:'任务/里程/用水/充电',size:'--',expireIn:4},
  {name:'S6车队周报.xlsx',status:'success',createTime:daysAgo(5,16,20),range:'2026-04-10 至 2026-04-16',vehicles:'S6-101, S6-102',items:'任务/里程/用水',size:'512 KB',expireIn:2},
  {name:'生物岛项目月度.xlsx',status:'expired',createTime:daysAgo(7,18,0),range:'2026-03-15 至 2026-04-14',vehicles:'全部车辆',items:'任务/里程/用水/充电/取消原因',size:'3.4 MB',expireIn:0}
];

function statusBadge(s){
  const map={success:['success','已完成'],pending:['pending','生成中'],failed:['failed','失败'],expired:['expired','已过期']};
  const [cls,txt]=map[s]; return `<span class="badge ${cls}">${txt}</span>`;
}

function renderList(){
  const html=records.map((r,i)=>{
    let actions='';
    if(r.status==='success'){
      actions=`<button class="btn btn-primary" onclick="download('${r.name}')">下载</button>
               <button class="btn btn-ghost" onclick="share('${r.name}')">分享链接</button>`;
    }else if(r.status==='pending'){
      actions=`<button class="btn btn-disabled" disabled>生成中 ${r.progress}%</button>`;
    }else if(r.status==='failed'){
      actions=`<button class="btn btn-primary" onclick="retry(${i})">重试</button>
               <button class="btn btn-ghost" onclick="viewErr('${r.errMsg}')">失败原因</button>`;
    }else{
      actions=`<button class="btn btn-disabled" disabled>已过期</button>`;
    }
    const expireText=r.status==='expired'?'已过期':(r.status==='success'?`${r.expireIn} 天后过期`:'--');
    return `<div class="exp-item">
      <div class="exp-head">
        <div class="exp-name">${r.name}</div>
        ${statusBadge(r.status)}
      </div>
      <div class="exp-meta">
        <div class="row"><span class="lbl">创建时间：</span><span class="val">${fmt(r.createTime)}</span></div>
        <div class="row"><span class="lbl">日期范围：</span><span class="val">${r.range}</span></div>
        <div class="row"><span class="lbl">车辆：</span><span class="val">${r.vehicles}</span></div>
        <div class="row"><span class="lbl">统计项：</span><span class="val">${r.items}</span></div>
        <div class="row"><span class="lbl">文件大小：</span><span class="val">${r.size} · ${expireText}</span></div>
      </div>
      <div class="exp-actions">${actions}</div>
    </div>`;
  }).join('');
  document.getElementById('expList').innerHTML=html||`<div class="empty">近 7 天暂无导出记录</div>`;
}

function showExport(){document.getElementById('page-me').classList.remove('show');document.getElementById('page-export').classList.add('show');renderList();window.scrollTo(0,0);}
function showMe(){document.getElementById('page-export').classList.remove('show');document.getElementById('page-me').classList.add('show');window.scrollTo(0,0);}
function download(name){toast(`开始下载 ${name}`);}
function share(name){toast(`已复制下载链接：${name}`);}
function retry(i){records[i].status='pending';records[i].progress=0;renderList();toast('已重新提交生成任务');}
function viewErr(msg){toast('失败原因：'+msg);}
function toast(m){const t=document.getElementById('toast');t.innerText=m;t.style.display='block';setTimeout(()=>t.style.display='none',2000);}
</script>
</body>
</html>
